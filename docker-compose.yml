services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - ./settings/.env:/app/settings/.env:ro
    environment:
      - BLOG_ENV_ID=local
      - BLOG_DATA_DIR=/app/data
    depends_on:
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A settings worker --loglevel=info
    volumes:
      - sqlite_data:/app/data
      - ./settings/.env:/app/settings/.env:ro
    environment:
      - BLOG_ENV_ID=local
      - BLOG_DATA_DIR=/app/data
    depends_on:
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    command: celery -A settings beat --loglevel=info
    volumes:
       - sqlite_data:/app/data
       - ./settings/.env:/app/settings/.env:ro
    environment:
       - BLOG_ENV_ID=local
       - BLOG_DATA_DIR=/app/data
    depends_on:
      redis:
         condition: service_healthy

  flower:
    build: .
    command: celery -A settings flower --basic_auth=${BLOG_FLOWER_USER:-admin}:${BLOG_FLOWER_PASSWORD:-changeme} --port=5555
    ports:
      - "5555:5555"
    volumes:
      - ./settings/.env:/app/settings/.env:ro
    environment:
      - BLOG_ENV_ID=local
    depends_on:
      redis:
        condition: service_healthy

volumes:
  sqlite_data: